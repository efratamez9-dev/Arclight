<style>
  html, body { margin: 0; padding: 0; background: #F7F7F5; }
  #root { min-height: 100vh; }
  @media (prefers-color-scheme: dark) { html, body { background: #14171A; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
  window.addEventListener("error", function (e) {
    var root = document.getElementById("root");
    if (root && !root.hasChildNodes()) {
      root.innerHTML =
        '<div style="font-family:sans-serif;padding:24px;color:#C24A3B;white-space:pre-wrap;">' +
        "Arclight failed to load:\n" + (e.message || e) +
        "</div>";
    }
  });
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
const {
  ResponsiveContainer, LineChart, Line, XAxis, YAxis, Tooltip, BarChart, Bar,
  PieChart, Pie, Cell, CartesianGrid
} = Recharts;

/* ---------------- lightweight icon set (feather-style, no external icon lib) ---------------- */
function Icon({ paths, viewBox = "0 0 24 24", size = 16, color = "currentColor", strokeWidth = 2, fill = "none", ...rest }) {
  return (
    <svg width={size} height={size} viewBox={viewBox} fill={fill} stroke={color} strokeWidth={strokeWidth}
      strokeLinecap="round" strokeLinejoin="round" {...rest}>
      {paths}
    </svg>
  );
}
const mkIcon = (paths, opts = {}) => (props) => <Icon paths={paths} {...opts} {...props} />;
const Home = mkIcon(<><path d="M3 11 12 3l9 8" /><path d="M5 10v10h14V10" /><path d="M10 20v-6h4v6" /></>);
const ListChecks = mkIcon(<><path d="m3 7 2 2 3-3" /><path d="m3 15 2 2 3-3" /><path d="M11 7h10" /><path d="M11 15h10" /></>);
const Repeat = mkIcon(<><path d="M17 2l4 4-4 4" /><path d="M3 11V9a4 4 0 0 1 4-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v2a4 4 0 0 1-4 4H3" /></>);
const Target = mkIcon(<><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="5" /><circle cx="12" cy="12" r="1" /></>);
const MoreHorizontal = mkIcon(<><circle cx="5" cy="12" r="1.5" /><circle cx="12" cy="12" r="1.5" /><circle cx="19" cy="12" r="1.5" /></>);
const Plus = mkIcon(<><path d="M12 5v14" /><path d="M5 12h14" /></>);
const X = mkIcon(<><path d="M18 6 6 18" /><path d="M6 6l12 12" /></>);
const Check = mkIcon(<path d="M20 6 9 17l-5-5" />);
const CalendarIcon = mkIcon(<><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M16 2v4" /><path d="M8 2v4" /><path d="M3 10h18" /></>);
const BarChart3 = mkIcon(<><path d="M3 3v18h18" /><rect x="7" y="12" width="3" height="6" /><rect x="12" y="8" width="3" height="10" /><rect x="17" y="5" width="3" height="13" /></>);
const Timer = mkIcon(<><path d="M10 2h4" /><path d="M12 14 15 11" /><circle cx="12" cy="14" r="8" /></>);
const BookOpen = mkIcon(<><path d="M2 5c2-1 5-1.5 8-.5v14c-3-1-6-.5-8 .5Z" /><path d="M22 5c-2-1-5-1.5-8-.5v14c3-1 6-.5 8 .5Z" /></>);
const Smile = mkIcon(<><circle cx="12" cy="12" r="9" /><path d="M8 14s1.5 2 4 2 4-2 4-2" /><path d="M9 9h.01" /><path d="M15 9h.01" /></>);
const SettingsIcon = mkIcon(<><circle cx="12" cy="12" r="3" /><path d="M19.4 13a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V19a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.04-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.04H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.04 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H10a1.7 1.7 0 0 0 1.04-1.56V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.04 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V10c.68.11 1.3.49 1.56 1.04H20a2 2 0 1 1 0 4h-.09c-.55 0-1.04.33-1.56 1.04Z" /></>);
const StickyNote = mkIcon(<><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5Z" /><path d="M15 3v5a1 1 0 0 0 1 1h5" /></>);
const Flame = mkIcon(<path d="M12 2c1 4-3 5-3 9a3 3 0 0 0 6 0c1.2 1 2 2.5 2 4.2A5.2 5.2 0 0 1 6.8 15.4C6.8 10 12 8 12 2Z" />);
const Trophy = mkIcon(<><path d="M8 4h8v6a4 4 0 0 1-8 0Z" /><path d="M8 5H4v2a4 4 0 0 0 4 4" /><path d="M16 5h4v2a4 4 0 0 1-4 4" /><path d="M12 14v3" /><path d="M9 21h6" /><path d="M10 17h4v4h-4Z" /></>);
const ChevronLeft = mkIcon(<path d="M15 18 9 12l6-6" />);
const ChevronRight = mkIcon(<path d="M9 18 15 12 9 6" />);
const Search = mkIcon(<><circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" /></>);
const Sun = mkIcon(<><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" /></>);
const Moon = mkIcon(<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />);
const Trash2 = mkIcon(<><path d="M3 6h18" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6Z" /><path d="M10 11v6M14 11v6" /></>);
const Clock = mkIcon(<><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></>);
const Play = mkIcon(<path d="M6 4l14 8-14 8Z" />, { fill: "currentColor" });
const Pause = mkIcon(<><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></>);
const RotateCcw = mkIcon(<><path d="M3 12a9 9 0 1 0 3-6.7" /><path d="M3 4v5h5" /></>);
const Download = mkIcon(<><path d="M12 3v12" /><path d="m7 10 5 5 5-5" /><path d="M5 21h14" /></>);
const Bell = mkIcon(<><path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6" /><path d="M10 21a2 2 0 0 0 4 0" /></>);
const Award = mkIcon(<><circle cx="12" cy="8" r="5" /><path d="m8.5 12.5-1.5 8 5-3 5 3-1.5-8" /></>);
const Star = mkIcon(<path d="m12 2 3 6.5 7 1-5 5 1.3 7-6.3-3.4L5.7 21.5 7 14.5l-5-5 7-1Z" />, { fill: "currentColor" });

/* ============================================================
   ARCLIGHT — token system
   Palette: paper #F7F7F5 / ink #1C1E1B / accent moss #2F6F5E /
            ember #E8A33D / rose #C24A3B  |  Dark: #14171A / #1D2124
   Type: display "Fraunces" (headers, big numbers) · body/UI "Inter" ·
         data "IBM Plex Mono" (streaks, timers, stats)
   Signature: concentric "day ring" — tasks/habits/goals progress as
   nested arcs, echoed in habit heatmaps and goal bars.
   ============================================================ */

const LIGHT = {
  bg: "#F7F7F5", surface: "#FFFFFF", surfaceAlt: "#EFEFEC",
  ink: "#1C1E1B", inkSoft: "#6B6F68", inkFaint: "#9CA096",
  border: "#E4E4DF", accent: "#2F6F5E", accentSoft: "#E3EEEA",
  ember: "#E8A33D", emberSoft: "#FBF0DC", rose: "#C24A3B", roseSoft: "#F7E7E4",
  shadow: "0 1px 2px rgba(28,30,27,0.04), 0 8px 24px rgba(28,30,27,0.06)"
};
const DARK = {
  bg: "#14171A", surface: "#1D2124", surfaceAlt: "#24282B",
  ink: "#F1F2EF", inkSoft: "#A6ABA3", inkFaint: "#6D716B",
  border: "#2B2F32", accent: "#4B9C86", accentSoft: "#1E2C28",
  ember: "#E8A33D", emberSoft: "#2B2419", rose: "#D9695A", roseSoft: "#2C1E1B",
  shadow: "0 1px 2px rgba(0,0,0,0.2), 0 8px 24px rgba(0,0,0,0.35)"
};

const uid = () => Math.random().toString(36).slice(2, 10);
const todayStr = () => new Date().toISOString().slice(0, 10);
const addDays = (str, n) => { const d = new Date(str); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
const dayLabel = (str) => new Date(str + "T00:00:00").toLocaleDateString(undefined, { weekday: "short" });
const fmtDate = (str) => new Date(str + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" });
const CATS = ["Work", "Personal", "Health", "Learning", "Errands"];
const CAT_COLOR = { Work: "#2F6F5E", Personal: "#8A6FBE", Health: "#C24A3B", Learning: "#3E7CB1", Errands: "#E8A33D" };

/* ---------------- seed data ---------------- */
function seed() {
  const t = todayStr();
  return {
    tasks: [
      { id: uid(), title: "Send EU CSF+ budget reconciliation", notes: "Match narrative total to Part 3 table", priority: "high", dueDate: t, category: "Work", recurring: "none", subtasks: [{ id: uid(), title: "Recheck admin cap 20%", done: true }, { id: uid(), title: "Email finance officer", done: false }], done: false, createdAt: t },
      { id: uid(), title: "Morning pages", notes: "", priority: "low", dueDate: t, category: "Personal", recurring: "daily", subtasks: [], done: true, createdAt: t },
      { id: uid(), title: "Review Project A physical plan", notes: "", priority: "medium", dueDate: t, category: "Work", recurring: "none", subtasks: [], done: false, createdAt: t },
      { id: uid(), title: "Grocery run", notes: "", priority: "low", dueDate: addDays(t, 1), category: "Errands", recurring: "none", subtasks: [], done: false, createdAt: t },
      { id: uid(), title: "French vocab — 20 min", notes: "", priority: "medium", dueDate: t, category: "Learning", recurring: "daily", subtasks: [], done: false, createdAt: t },
    ],
    habits: [
      { id: uid(), name: "Drink 2L water", color: "#3E7CB1", frequency: "daily", history: mkHistory(t, [0,1,2,3,5,6,7,8,9,10]) },
      { id: uid(), name: "Read 20 pages", color: "#8A6FBE", frequency: "daily", history: mkHistory(t, [1,2,4,5,6,8,9]) },
      { id: uid(), name: "Evening walk", color: "#2F6F5E", frequency: "custom", days: [1,3,5], history: mkHistory(t, [2,5,9,12]) },
    ],
    goals: [
      { id: uid(), title: "Submit EU CSF+ EOI", deadline: "2026-08-04", color: "#2F6F5E", milestones: [{ id: uid(), title: "Draft narrative", done: true }, { id: uid(), title: "Build budget workbook", done: true }, { id: uid(), title: "Reconcile totals", done: false }, { id: uid(), title: "Final submission", done: false }] },
      { id: uid(), title: "Reach A2 French", deadline: "2026-09-01", color: "#3E7CB1", milestones: [{ id: uid(), title: "Complete crash course", done: true }, { id: uid(), title: "50 mock interview Qs", done: false }, { id: uid(), title: "Full mock interview", done: false }] },
    ],
    notes: [{ id: uid(), title: "Donor call notes", body: "Follow up with CCRDA on registration timeline.", updatedAt: t }],
    journal: [{ id: uid(), date: t, text: "Solid progress on the budget today. Feeling steady.", mood: 4 }],
    moods: [{ id: uid(), date: addDays(t, -1), mood: 3 }, { id: uid(), date: t, mood: 4 }],
    xp: 165,
  };
}
function mkHistory(t, offsets) {
  const h = {};
  offsets.forEach(o => { h[addDays(t, -o)] = true; });
  return h;
}

/* ---------------- streak calc ---------------- */
function computeStreak(habit) {
  let streak = 0;
  let d = todayStr();
  if (!habit.history[d]) d = addDays(d, -1);
  while (habit.history[d]) { streak++; d = addDays(d, -1); }
  return streak;
}

const BADGES = [
  { id: "first-step", label: "First Step", desc: "Complete your first task", icon: Star, cond: (s) => s.tasks.some(t => t.done) },
  { id: "streak-7", label: "Week Streak", desc: "7-day streak on any habit", icon: Flame, cond: (s) => s.habits.some(h => computeStreak(h) >= 7) },
  { id: "goal-getter", label: "Goal Getter", desc: "Hit a milestone", icon: Target, cond: (s) => s.goals.some(g => g.milestones.some(m => m.done)) },
  { id: "level-3", label: "Level 3", desc: "Reach 200 XP", icon: Trophy, cond: (s) => s.xp >= 200 },
];

/* ============================================================ */

const STORAGE_KEY = "arclight-data";
const DARK_KEY = "arclight-dark";
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return seed();
}
function loadDark() {
  try {
    const raw = localStorage.getItem(DARK_KEY);
    if (raw !== null) return raw === "1";
  } catch (e) {}
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
}

function Arclight() {
  const [dark, setDark] = useState(loadDark);
  const T = dark ? DARK : LIGHT;
  const [tab, setTab] = useState("today");
  const [more, setMore] = useState(null);
  const [state, setState] = useState(loadState);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }, [state]);

  useEffect(() => {
    try { localStorage.setItem(DARK_KEY, dark ? "1" : "0"); } catch (e) {}
  }, [dark]);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1600); };
  const addXP = (n) => setState(s => ({ ...s, xp: s.xp + n }));

  const level = Math.floor(state.xp / 100) + 1;
  const xpIntoLevel = state.xp % 100;

  /* ---- task ops ---- */
  const toggleTask = (id) => setState(s => {
    const tasks = s.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    const changed = tasks.find(t => t.id === id);
    if (changed?.done) { flash("+10 XP · Task complete"); }
    return { ...s, tasks, xp: s.xp + (changed?.done ? 10 : -10) };
  });
  const addTask = (task) => setState(s => ({ ...s, tasks: [{ ...task, id: uid(), done: false, subtasks: task.subtasks || [] }, ...s.tasks] }));
  const deleteTask = (id) => setState(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== id) }));
  const toggleSubtask = (taskId, subId) => setState(s => ({
    ...s, tasks: s.tasks.map(t => t.id !== taskId ? t : { ...t, subtasks: t.subtasks.map(st => st.id === subId ? { ...st, done: !st.done } : st) })
  }));

  /* ---- habit ops ---- */
  const toggleHabit = (id, date = todayStr()) => setState(s => {
    const habits = s.habits.map(h => {
      if (h.id !== id) return h;
      const history = { ...h.history };
      if (history[date]) delete history[date]; else history[date] = true;
      return { ...h, history };
    });
    const nowOn = habits.find(h => h.id === id).history[date];
    if (nowOn) flash("+5 XP · Habit checked in");
    return { ...s, habits, xp: s.xp + (nowOn ? 5 : -5) };
  });
  const addHabit = (habit) => setState(s => ({ ...s, habits: [{ ...habit, id: uid(), history: {} }, ...s.habits] }));
  const deleteHabit = (id) => setState(s => ({ ...s, habits: s.habits.filter(h => h.id !== id) }));

  /* ---- goal ops ---- */
  const toggleMilestone = (goalId, mId) => setState(s => {
    let gained = 0;
    const goals = s.goals.map(g => {
      if (g.id !== goalId) return g;
      const milestones = g.milestones.map(m => {
        if (m.id !== mId) return m;
        gained = m.done ? -15 : 15;
        return { ...m, done: !m.done };
      });
      return { ...g, milestones };
    });
    if (gained > 0) flash("+15 XP · Milestone hit");
    return { ...s, goals, xp: s.xp + gained };
  });
  const addGoal = (goal) => setState(s => ({ ...s, goals: [{ ...goal, id: uid(), milestones: goal.milestones || [] }, ...s.goals] }));
  const deleteGoal = (id) => setState(s => ({ ...s, goals: s.goals.filter(g => g.id !== id) }));

  const unlockedBadges = useMemo(() => BADGES.filter(b => b.cond(state)), [state]);

  const styleVars = {
    "--bg": T.bg, "--surface": T.surface, "--surfaceAlt": T.surfaceAlt, "--ink": T.ink,
    "--inkSoft": T.inkSoft, "--inkFaint": T.inkFaint, "--border": T.border, "--accent": T.accent,
    "--accentSoft": T.accentSoft, "--ember": T.ember, "--emberSoft": T.emberSoft,
    "--rose": T.rose, "--roseSoft": T.roseSoft,
    fontFamily: "Inter, sans-serif", background: T.bg, color: T.ink, minHeight: "100vh"
  };

  return (
    <div style={styleVars} className="w-full max-w-md mx-auto relative pb-24" >
      <style>{`
        .disp { font-family: 'Fraunces', serif; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        * { transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .12s ease; }
        .press:active { transform: scale(0.97); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: ${T.shadow}; }
        ::-webkit-scrollbar { display: none; }
      `}</style>

      <Header T={T} dark={dark} setDark={setDark} level={level} xp={state.xp} xpIntoLevel={xpIntoLevel} />

      <main className="px-4">
        {tab === "today" && <Today T={T} state={state} toggleTask={toggleTask} toggleHabit={toggleHabit} />}
        {tab === "tasks" && <Tasks T={T} tasks={state.tasks} toggleTask={toggleTask} addTask={addTask} deleteTask={deleteTask} toggleSubtask={toggleSubtask} />}
        {tab === "habits" && <Habits T={T} habits={state.habits} toggleHabit={toggleHabit} addHabit={addHabit} deleteHabit={deleteHabit} />}
        {tab === "goals" && <Goals T={T} goals={state.goals} tasks={state.tasks} habits={state.habits} toggleMilestone={toggleMilestone} addGoal={addGoal} deleteGoal={deleteGoal} />}
        {tab === "more" && !more && <MoreMenu T={T} setMore={setMore} unlockedBadges={unlockedBadges} />}
        {tab === "more" && more === "calendar" && <CalendarView T={T} state={state} back={() => setMore(null)} />}
        {tab === "more" && more === "analytics" && <Analytics T={T} state={state} back={() => setMore(null)} />}
        {tab === "more" && more === "pomodoro" && <Pomodoro T={T} back={() => setMore(null)} flash={flash} />}
        {tab === "more" && more === "notes" && <Notes T={T} notes={state.notes} setState={setState} back={() => setMore(null)} />}
        {tab === "more" && more === "journal" && <Journal T={T} journal={state.journal} setState={setState} back={() => setMore(null)} />}
        {tab === "more" && more === "mood" && <Mood T={T} moods={state.moods} setState={setState} back={() => setMore(null)} />}
        {tab === "more" && more === "badges" && <Badges T={T} unlocked={unlockedBadges} back={() => setMore(null)} />}
        {tab === "more" && more === "settings" && <SettingsView T={T} dark={dark} setDark={setDark} state={state} back={() => setMore(null)} />}
      </main>

      {toast && (
        <div className="fixed left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 rounded-full text-sm font-medium z-50"
          style={{ background: T.ink, color: T.bg }}>
          {toast}
        </div>
      )}

      <BottomNav T={T} tab={tab} setTab={(x) => { setTab(x); if (x !== "more") setMore(null); }} />
    </div>
  );
}

/* ============================== HEADER ============================== */
function Header({ T, dark, setDark, level, xp, xpIntoLevel }) {
  const d = new Date();
  const greeting = d.getHours() < 12 ? "Good morning" : d.getHours() < 18 ? "Good afternoon" : "Good evening";
  return (
    <div className="px-5 pt-6 pb-4 flex items-start justify-between">
      <div>
        <div className="text-xs font-semibold tracking-wide" style={{ color: T.inkFaint }}>
          {d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })}
        </div>
        <div className="disp text-2xl mt-0.5" style={{ fontWeight: 500 }}>{greeting}, Ephy</div>
      </div>
      <div className="flex items-center gap-2">
        <div className="flex flex-col items-end mr-1">
          <div className="flex items-center gap-1 text-xs font-semibold mono" style={{ color: T.accent }}>

/* ============================== DAY RING (signature element) ============================== */
function DayRing({ T, size = 132, rings }) {
  // rings: [{value 0-1, color}]
  const stroke = 9, gap = 4;
  const center = size / 2;
  return (
    <svg width={size} height={size}>
      {rings.map((r, i) => {
        const radius = center - stroke / 2 - i * (stroke + gap);
        const circ = 2 * Math.PI * radius;
        return (
          <g key={i}>
            <circle cx={center} cy={center} r={radius} fill="none" stroke={T.surfaceAlt} strokeWidth={stroke} />
            <circle cx={center} cy={center} r={radius} fill="none" stroke={r.color} strokeWidth={stroke}
              strokeDasharray={circ} strokeDashoffset={circ * (1 - r.value)} strokeLinecap="round"
              transform={`rotate(-90 ${center} ${center})`} style={{ transition: "stroke-dashoffset .5s ease" }} />
          </g>
        );
      })}
    </svg>
  );
}

/* ============================== TODAY ============================== */
function Today({ T, state, toggleTask, toggleHabit }) {
  const t = todayStr();
  const todaysTasks = state.tasks.filter(x => x.dueDate === t);
  const doneTasks = todaysTasks.filter(x => x.done).length;
  const taskPct = todaysTasks.length ? doneTasks / todaysTasks.length : 0;

  const todaysHabits = state.habits.filter(h => h.frequency === "daily" || (h.days || []).includes(new Date().getDay()));
  const doneHabits = todaysHabits.filter(h => h.history[t]).length;
  const habitPct = todaysHabits.length ? doneHabits / todaysHabits.length : 0;

  const goalPct = state.goals.length
    ? state.goals.reduce((acc, g) => acc + (g.milestones.filter(m => m.done).length / Math.max(1, g.milestones.length)), 0) / state.goals.length
    : 0;

  const upcoming = state.tasks.filter(x => !x.done && x.dueDate > t).sort((a, b) => a.dueDate < b.dueDate ? -1 : 1).slice(0, 3);

  return (
    <div>
      <div className="card p-5 flex items-center gap-5">
        <DayRing T={T} rings={[{ value: taskPct, color: T.accent }, { value: habitPct, color: T.ember }, { value: goalPct, color: "#8A6FBE" }]} />
        <div className="flex-1">
          <div className="disp text-2xl" style={{ fontWeight: 500 }}>{Math.round((taskPct + habitPct + goalPct) / 3 * 100)}%</div>
          <div className="text-xs mb-2" style={{ color: T.inkFaint }}>of today's arc complete</div>
          <Legend T={T} color={T.accent} label={`Tasks ${doneTasks}/${todaysTasks.length}`} />
          <Legend T={T} color={T.ember} label={`Habits ${doneHabits}/${todaysHabits.length}`} />
          <Legend T={T} color="#8A6FBE" label={`Goals ${Math.round(goalPct * 100)}%`} />
        </div>
      </div>

      <SectionTitle T={T}>Today's tasks</SectionTitle>
      <div className="flex flex-col gap-2">
        {todaysTasks.length === 0 && <Empty T={T} text="Nothing due today. Enjoy the clear runway." />}
        {todaysTasks.map(task => <TaskRow key={task.id} T={T} task={task} onToggle={() => toggleTask(task.id)} />)}
      </div>

      <SectionTitle T={T}>Habit check-ins</SectionTitle>
      <div className="grid grid-cols-2 gap-2">
        {todaysHabits.map(h => {
          const on = !!h.history[t];
          const streak = computeStreak(h);
          return (
            <button key={h.id} onClick={() => toggleHabit(h.id)} className="press card p-3 text-left" style={{ borderColor: on ? h.color : T.border }}>
              <div className="flex items-center justify-between">
                <div className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background: on ? h.color : T.surfaceAlt }}>
                  <Check size={14} color={on ? "#fff" : T.inkFaint} />
                </div>
                <div className="flex items-center gap-1 text-xs mono" style={{ color: T.ember }}><Flame size={12} />{streak}</div>
              </div>
              <div className="text-sm mt-2 font-medium">{h.name}</div>
            </button>
          );
        })}
      </div>

      <SectionTitle T={T}>Upcoming deadlines</SectionTitle>
      <div className="flex flex-col gap-2">
        {upcoming.length === 0 && <Empty T={T} text="Nothing on the horizon yet." />}
        {upcoming.map(u => (
          <div key={u.id} className="card p-3 flex items-center justify-between">
            <div>
              <div className="text-sm font-medium">{u.title}</div>
              <div className="text-xs" style={{ color: T.inkFaint }}>{u.category}</div>
            </div>
            <div className="text-xs mono px-2 py-1 rounded-full" style={{ background: T.surfaceAlt, color: T.inkSoft }}>{fmtDate(u.dueDate)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function Legend({ T, color, label }) {
  return <div className="flex items-center gap-2 text-xs mb-1" style={{ color: T.inkSoft }}>
    <span className="w-2 h-2 rounded-full" style={{ background: color }} />{label}

/* ============================== CALENDAR ============================== */
function CalendarView({ T, state, back }) {
  const [cursor, setCursor] = useState(new Date());
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const first = new Date(year, month, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [...Array(startOffset).fill(null), ...Array.from({ length: daysInMonth }, (_, i) => i + 1)];

  const dateStr = (day) => `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
  const eventsFor = (day) => {
    const d = dateStr(day);
    const tasks = state.tasks.filter(t => t.dueDate === d);
    const habitsOn = state.habits.filter(h => h.history[d]);
    const goalDeadlines = state.goals.filter(g => g.deadline === d);
    return { tasks, habitsOn, goalDeadlines };
  };

  return (
    <div>
      <BackBar T={T} title="Calendar" back={back} />
      <div className="flex items-center justify-between mb-3">
        <button onClick={() => setCursor(new Date(year, month - 1, 1))} className="press w-8 h-8 rounded-full flex items-center justify-center card"><ChevronLeft size={15} /></button>
        <div className="text-sm font-semibold">{cursor.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</div>
        <button onClick={() => setCursor(new Date(year, month + 1, 1))} className="press w-8 h-8 rounded-full flex items-center justify-center card"><ChevronRight size={15} /></button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center text-[10px] mb-1" style={{ color: T.inkFaint }}>
        {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <div key={i}>{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((day, i) => {
          if (!day) return <div key={i} />;
          const { tasks, habitsOn, goalDeadlines } = eventsFor(day);
          const isToday = dateStr(day) === todayStr();
          return (
            <div key={i} className="aspect-square rounded-lg p-1 flex flex-col items-center card" style={{ borderColor: isToday ? T.accent : T.border }}>
              <span className="text-[11px] mono" style={{ color: isToday ? T.accent : T.inkSoft, fontWeight: isToday ? 700 : 500 }}>{day}</span>
              <div className="flex gap-0.5 mt-auto flex-wrap justify-center">
                {tasks.slice(0, 2).map((t, j) => <span key={j} className="w-1.5 h-1.5 rounded-full" style={{ background: CAT_COLOR[t.category] }} />)}
                {habitsOn.slice(0, 1).map((h, j) => <span key={j} className="w-1.5 h-1.5 rounded-full" style={{ background: T.ember }} />)}
                {goalDeadlines.length > 0 && <span className="w-1.5 h-1.5 rounded-full" style={{ background: "#8A6FBE" }} />}
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex gap-4 mt-4 text-[11px]" style={{ color: T.inkFaint }}>
        <Legend T={T} color={T.accent} label="Task" />
        <Legend T={T} color={T.ember} label="Habit" />
        <Legend T={T} color="#8A6FBE" label="Goal deadline" />
      </div>
    </div>
  );
}

/* ============================== POMODORO ============================== */
function Pomodoro({ T, back, flash }) {
  const WORK = 25 * 60, BREAK = 5 * 60;
  const [seconds, setSeconds] = useState(WORK);
  const [running, setRunning] = useState(false);
  const [mode, setMode] = useState("work");
  const [sessions, setSessions] = useState(0);
  const ref = useRef();

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => setSeconds(s => {
        if (s <= 1) {
          clearInterval(ref.current);
          if (mode === "work") { setSessions(x => x + 1); setMode("break"); flash("Session complete — take a break"); return BREAK; }
          setMode("work"); flash("Break's over — back to it"); return WORK;
        }
        return s - 1;
      }), 1000);
    }
    return () => clearInterval(ref.current);
  }, [running, mode]);

  const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
  const ss = String(seconds % 60).padStart(2, "0");
  const total = mode === "work" ? WORK : BREAK;
  const pct = 1 - seconds / total;

  return (
    <div>
      <BackBar T={T} title="Pomodoro" back={back} />
      <div className="card p-8 flex flex-col items-center">
        <div className="text-xs font-semibold px-3 py-1 rounded-full mb-6" style={{ background: mode === "work" ? T.accentSoft : T.emberSoft, color: mode === "work" ? T.accent : T.ember }}>
          {mode === "work" ? "Focus session" : "Break time"}
        </div>
        <div className="relative flex items-center justify-center">
          <DayRing T={T} size={200} rings={[{ value: pct, color: mode === "work" ? T.accent : T.ember }]} />
          <div className="absolute disp text-4xl mono" style={{ fontWeight: 500 }}>{mm}:{ss}</div>
        </div>
        <div className="flex items-center gap-4 mt-6">
          <button onClick={() => { setRunning(false); setSeconds(total); }} className="press w-11 h-11 rounded-full flex items-center justify-center card"><RotateCcw size={16} /></button>
          <button onClick={() => setRunning(r => !r)} className="press w-16 h-16 rounded-full flex items-center justify-center" style={{ background: T.accent }}>
            {running ? <Pause size={24} color="#fff" /> : <Play size={24} color="#fff" fill="#fff" />}
          </button>
          <button onClick={() => { setRunning(false); setMode(mode === "work" ? "break" : "work"); setSeconds(mode === "work" ? BREAK : WORK); }} className="press w-11 h-11 rounded-full flex items-center justify-center card"><Repeat size={16} /></button>
        </div>
        <div className="text-xs mono mt-6" style={{ color: T.inkFaint }}>{sessions} sessions completed today</div>
      </div>
    </div>
  );
}

}

/* ============================== MOUNT ============================== */
try {
  ReactDOM.createRoot(document.getElementById("root")).render(<Arclight />);
} catch (err) {
  document.getElementById("root").innerHTML =
    '<div style="font-family:sans-serif;padding:24px;color:#C24A3B;white-space:pre-wrap;">' +
    'Arclight failed to start:\n' + (err && err.message ? err.message : err) +
    '</div>';
  console.error(err);
}
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
